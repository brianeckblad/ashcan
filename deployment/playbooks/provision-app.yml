---
# Application resource provisioning — shared-server model
# Creates all per-app AWS resources: S3, IAM policies, Secrets Manager.
# Does NOT provision the server itself (handled by the shared server team).
#
# Run this ONCE to bootstrap a new application instance.
# Must be run AFTER create-deploy-user.yml has populated vault credentials and
# configured the local AWS CLI profile ({app_name}-deploy). Every play here
# uses that profile via environment.AWS_PROFILE.
#
# Usage:
#   ansible-playbook playbooks/provision-app.yml --vault-password-file ~/.vault_pass
#
# Individual resources can also be created separately:
#   ansible-playbook playbooks/create-s3-bucket.yml --vault-password-file ~/.vault_pass
#   ansible-playbook playbooks/create-iam-policies.yml --vault-password-file ~/.vault_pass
#   ansible-playbook playbooks/setup-secrets-manager.yml --vault-password-file ~/.vault_pass

# ==============================================================================
# Preflight: confirm we are running as the deployer user, not root
# ==============================================================================

- name: Preflight — verify deployer identity
  hosts: localhost
  gather_facts: no
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vault.yml
  environment:
    # All AWS API calls (CLI + community.aws/amazon.aws modules) use the
    # dedicated deploy profile created by create-deploy-user.yml.
    AWS_PROFILE: "{{ app_deploy_user | default(app_name + '-deploy') }}"
  vars:
    _expected_user: "{{ app_deploy_user | default(app_name + '-deploy') }}"
  tasks:
    - name: Preflight — deploy credentials must exist in vault
      # Fail fast with a clear message if create-deploy-user.yml has not been
      # run yet. Without this, downstream AWS calls would silently fall back
      # to the user's default profile (often a root/admin account).
      fail:
        msg: |
          deploy_aws_access_key_id is not set in group_vars/vault.yml.

          Run this first:
            ansible-playbook playbooks/create-deploy-user.yml \
                --vault-password-file ~/.vault_pass

          That playbook creates the {{ _expected_user }} IAM user, rotates
          its access keys, writes them back into the encrypted vault, and
          configures the local AWS CLI profile that every other playbook
          uses via environment.AWS_PROFILE.
      when:
        - deploy_aws_access_key_id is not defined or deploy_aws_access_key_id | trim | length == 0

    - name: Get current AWS caller identity
      command: aws sts get-caller-identity
      register: _caller
      changed_when: false

    - name: Parse identity ARN
      set_fact:
        _caller_arn: "{{ (_caller.stdout | from_json).Arn }}"

    - name: Fail if running as root account
      fail:
        msg: |
          AWS CLI is currently configured as: {{ _caller_arn }}

          provision-app.yml must run as the deploy user ({{ _expected_user }}),
          not as a root or admin account.

          Restore the local profile from vault:
            ansible-playbook playbooks/configure-local-aws.yml --vault-password-file ~/.vault_pass

          Or run create-deploy-user.yml if the deploy user does not exist yet — it
          creates the user, rotates the access key, and configures the CLI profile.
      when: "'root' in _caller_arn"

    - name: Warn if not the expected deployer user
      debug:
        msg:
          - "⚠️  Current identity ({{ _caller_arn }}) does not match expected deployer"
          - "   user ({{ _expected_user }}). Continuing, but verify this is intentional."
      when: _expected_user not in _caller_arn and 'root' not in _caller_arn

    - name: Confirm deployer identity
      debug:
        msg: "✓ Running as {{ _caller_arn }}"
      when: _expected_user in _caller_arn

# ==============================================================================
# Overview
# ==============================================================================

- name: Display provisioning plan
  hosts: localhost
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vault.yml
  environment:
    # All AWS API calls (CLI + community.aws/amazon.aws modules) use the
    # dedicated deploy profile created by create-deploy-user.yml.
    AWS_PROFILE: "{{ app_deploy_user | default(app_name + '-deploy') }}"
  gather_facts: no
  tasks:
    - name: Show what will be created
      debug:
        msg:
          - "╔══════════════════════════════════════════════════════════╗"
          - "║   Application Resource Provisioning                     ║"
          - "╚══════════════════════════════════════════════════════════╝"
          - ""
          - "This will create (in order):"
          - "  1. S3 bucket for application data"
          - "  2. IAM managed policies (S3, Secrets Manager, CloudWatch)"
          - "     Attached to role: {{ server_iam_role_name | default('(not specified — attach manually)') }}"
          - "  3. Secrets Manager secret (synced from vault)"
          - ""
          - "App:    {{ app_display_name }}"
          - "Region: {{ aws_region }}"

# ==============================================================================
# Step 1: Create S3 Bucket
# ==============================================================================

- name: Step 1 - Create S3 Bucket
  import_playbook: create-s3-bucket.yml

# ==============================================================================
# Step 2: Create IAM Policies
# ==============================================================================

- name: Step 2 - Create IAM Policies
  import_playbook: create-iam-policies.yml

# ==============================================================================
# Step 3: Setup Secrets Manager
# ==============================================================================

- name: Step 3 - Setup Secrets Manager
  import_playbook: setup-secrets-manager.yml


# ==============================================================================
# Summary
# ==============================================================================

- name: Display completion summary
  hosts: localhost
  gather_facts: no
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vault.yml
  environment:
    # All AWS API calls (CLI + community.aws/amazon.aws modules) use the
    # dedicated deploy profile created by create-deploy-user.yml.
    AWS_PROFILE: "{{ app_deploy_user | default(app_name + '-deploy') }}"
  tasks:
    - name: Display summary
      debug:
        msg:
          - "╔══════════════════════════════════════════════════════════╗"
          - "║   Application Resources Ready                           ║"
          - "╚══════════════════════════════════════════════════════════╝"
          - ""
          - "✓ Created:"
          - "    S3 Bucket:          {{ s3_bucket_name }}"
          - "    IAM Policies:       {{ app_name }}-s3-access, {{ app_name }}-secrets-access, {{ app_name }}-cloudwatch-access"
          - "    Secrets Manager:    {{ secret_name }}"
          - ""
          - "IAM policy attachment:"
          - "{{ '    Attached to role: ' + server_iam_role_name if server_iam_role_name is defined and server_iam_role_name else '    ⚠️  server_iam_role_name not set — attach policies manually to your server role.' }}"
          - ""
          - "Next: deploy the application code to your shared server."
          - "  ansible-playbook playbooks/setup.yml --vault-password-file ~/.vault_pass"

