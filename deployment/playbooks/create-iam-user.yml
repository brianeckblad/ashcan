---
# Playbook to create the IAM deployer user.
# Creates a limited IAM user with permissions to manage only app-level AWS resources
# (S3, Secrets Manager, IAM policies, CloudWatch). No EC2 permissions needed.
#
# Run once with root (or admin) AWS credentials, then reconfigure the AWS CLI
# to use the new user's access keys.
#
# Usage (recommended — after vault.yml exists):
#   ansible-playbook playbooks/create-iam-user.yml --vault-password-file ~/.vault_pass
#
# Usage (fallback — before vault.yml exists):
#   ansible-playbook playbooks/create-iam-user.yml -e app_name=myapp
#
# What gets created:
#   1. IAM user:  {app_name}-deployer
#   2. Managed policies: S3, IAM, SecretsManager, CloudWatch Logs
#   3. Inline policy: CloudWatch Alarms
#   4. Access key pair (printed once — save immediately)
#
# To delete: ansible-playbook playbooks/delete-iam-user.yml --vault-password-file ~/.vault_pass

- name: Create IAM Deployer User
  hosts: localhost
  gather_facts: no
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vault.yml
  vars:
    # Use app_deploy_user from vault if set; fall back to {app_name}-deployer convention.
    iam_user_name: "{{ app_deploy_user | default(app_name + '-deployer') }}"

    managed_policies:
      - "arn:aws:iam::aws:policy/AmazonS3FullAccess"
      - "arn:aws:iam::aws:policy/IAMFullAccess"
      - "arn:aws:iam::aws:policy/SecretsManagerReadWrite"
      - "arn:aws:iam::aws:policy/CloudWatchLogsFullAccess"

  pre_tasks:
    - name: Validate app_name is set
      fail:
        msg: |
          app_name is required.  Pass it on the command line:
            ansible-playbook playbooks/create-iam-user.yml -e app_name=myapp
      when: app_name is not defined or app_name | trim | length == 0

  tasks:

    # ── Step 1: Create IAM user ────────────────────────────────────────────
    - name: "Step 1/4 — Create IAM user {{ iam_user_name }}"
      amazon.aws.iam_user:
        name: "{{ iam_user_name }}"
        state: present
        tags:
          Application: "{{ app_name }}"
          Purpose: deployer
          ManagedBy: Ansible

    # ── Step 2: Attach managed policies ────────────────────────────────────
    - name: "Step 2/4 — Attach managed policies"
      command: >
        aws iam attach-user-policy
        --user-name {{ iam_user_name }}
        --policy-arn {{ item }}
      loop: "{{ managed_policies }}"
      changed_when: true

    # ── Step 3: Create CloudWatch Alarms inline policy ─────────────────────
    - name: "Step 3/4 — Attach CloudWatch Alarms inline policy"
      amazon.aws.iam_policy:
        iam_type: user
        iam_name: "{{ iam_user_name }}"
        policy_name: "CloudWatchAlarmPolicy"
        state: present
        policy_json:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - "cloudwatch:PutMetricAlarm"
                - "cloudwatch:DeleteAlarms"
                - "cloudwatch:DescribeAlarms"
                - "cloudwatch:GetMetricStatistics"
                - "cloudwatch:ListMetrics"
              Resource: "*"

    # ── Step 4: Create access key ──────────────────────────────────────────
    - name: "Step 4/4 — Check for existing access keys"
      amazon.aws.iam_access_key_info:
        user_name: "{{ iam_user_name }}"
      register: existing_keys

    - name: "Step 4/4 — Create access key"
      amazon.aws.iam_access_key:
        user_name: "{{ iam_user_name }}"
        state: present
      register: new_key
      when: existing_keys.access_keys | length == 0

    - name: Display new access key
      debug:
        msg:
          - ""
          - "╔══════════════════════════════════════════════════════════╗"
          - "║   IAM Deployer User Created                             ║"
          - "╚══════════════════════════════════════════════════════════╝"
          - ""
          - "  User:              {{ iam_user_name }}"
          - "  Access Key ID:     {{ new_key.access_key.access_key_id }}"
          - "  Secret Access Key: {{ new_key.secret_access_key }}"
          - ""
          - "  Managed Policies:"
          - "    • AmazonS3FullAccess"
          - "    • IAMFullAccess"
          - "    • SecretsManagerReadWrite"
          - "    • CloudWatchLogsFullAccess"
          - "  Inline Policy:"
          - "    • CloudWatchAlarmPolicy (alarms & metrics)"
          - ""
      when: new_key is changed

    # ── Step 5: Write credentials back to vault.yml ───────────────────────
    # Saves the key pair into vault.yml so they are never lost outside the vault.
    # Requires ~/.vault_pass for encrypted vaults. Skipped if the key already
    # existed (new_key is skipped) because the secret cannot be retrieved again.
    - name: "Step 5/5 — Save credentials to vault.yml"
      when: new_key is changed
      block:
        - name: Locate vault file
          set_fact:
            _vault_file: "{{ playbook_dir | dirname }}/group_vars/vault.yml"

        - name: Check whether vault is encrypted
          shell: "head -1 '{{ _vault_file }}' | grep -q ANSIBLE_VAULT && echo yes || echo no"
          register: _vault_encrypted
          changed_when: false

        - name: Check whether ~/.vault_pass exists
          stat:
            path: "{{ ansible_env.HOME }}/.vault_pass"
          register: _vpass_stat

        - name: Decrypt vault to temp file
          shell: >
            ansible-vault decrypt '{{ _vault_file }}'
            --vault-password-file '{{ ansible_env.HOME }}/.vault_pass'
            --output /tmp/_vault_cred_tmp.yml
          when: _vault_encrypted.stdout == 'yes' and _vpass_stat.stat.exists
          changed_when: true

        - name: Copy plaintext vault to temp file
          shell: "cp '{{ _vault_file }}' /tmp/_vault_cred_tmp.yml"
          when: _vault_encrypted.stdout != 'yes'
          changed_when: true

        - name: Confirm temp file is available
          stat:
            path: /tmp/_vault_cred_tmp.yml
          register: _tmp_stat

        - name: Write aws_access_key_id into temp vault
          lineinfile:
            path: /tmp/_vault_cred_tmp.yml
            regexp: '^aws_access_key_id:'
            line: 'aws_access_key_id: "{{ new_key.access_key.access_key_id }}"'
            insertbefore: EOF
          when: _tmp_stat.stat.exists

        - name: Write aws_secret_access_key into temp vault
          lineinfile:
            path: /tmp/_vault_cred_tmp.yml
            regexp: '^aws_secret_access_key:'
            line: 'aws_secret_access_key: "{{ new_key.secret_access_key }}"'
            insertbefore: EOF
          when: _tmp_stat.stat.exists

        - name: Re-encrypt vault with new credentials
          shell: >
            ansible-vault encrypt /tmp/_vault_cred_tmp.yml
            --vault-password-file '{{ ansible_env.HOME }}/.vault_pass'
            --output '{{ _vault_file }}'
          when: _tmp_stat.stat.exists and _vault_encrypted.stdout == 'yes' and _vpass_stat.stat.exists
          changed_when: true

        - name: Copy updated plaintext vault back
          shell: "cp /tmp/_vault_cred_tmp.yml '{{ _vault_file }}'"
          when: _tmp_stat.stat.exists and _vault_encrypted.stdout != 'yes'
          changed_when: true

        - name: Remove temp file
          file:
            path: /tmp/_vault_cred_tmp.yml
            state: absent

        - name: Confirm credentials saved
          debug:
            msg:
              - "✓ Credentials saved to vault.yml (encrypted)."
              - ""
              - "  To reconfigure the AWS CLI on any machine:"
              - "    cd deployment && source scripts/load-vars.sh"
              - "    aws configure set aws_access_key_id     $aws_access_key_id"
              - "    aws configure set aws_secret_access_key $aws_secret_access_key"
              - "    aws configure set region                $aws_region"
              - ""
              - "  Verify:  aws sts get-caller-identity"
          when: _tmp_stat.stat.exists

        - name: Warn when vault_pass unavailable
          debug:
            msg:
              - "⚠️  ~/.vault_pass not found — credentials NOT saved to vault.yml."
              - "  Add them manually before encrypting:"
              - "    aws_access_key_id: {{ new_key.access_key.access_key_id }}"
              - "    aws_secret_access_key: <secret shown above>"
          when: _vault_encrypted.stdout == 'yes' and not _vpass_stat.stat.exists

    # ── Step 6: Switch AWS CLI to the new deployer user ───────────────────
    # Credentials are already in memory — configure immediately so all
    # subsequent playbooks (provision-app, setup-secrets-manager, etc.) run
    # as the deployer user without any manual intervention.
    - name: "Step 6 — Configure AWS CLI as {{ iam_user_name }}"
      when: new_key is changed
      block:
        - name: Set aws_access_key_id in CLI profile
          command: aws configure set aws_access_key_id {{ new_key.access_key.access_key_id }}
          changed_when: true
          no_log: true

        - name: Set aws_secret_access_key in CLI profile
          command: aws configure set aws_secret_access_key {{ new_key.secret_access_key }}
          changed_when: true
          no_log: true

        - name: Set default region in CLI profile
          command: aws configure set region {{ aws_region }}
          changed_when: true

        - name: Set output format in CLI profile
          command: aws configure set output json
          changed_when: true

        - name: Verify new identity
          command: aws sts get-caller-identity
          register: _new_identity
          changed_when: false

        - name: Confirm CLI switched to deployer user
          debug:
            msg:
              - "✓ AWS CLI is now configured as the deployer user."
              - ""
              - "  Identity: {{ (_new_identity.stdout | from_json).Arn }}"
              - ""
              - "  You can now run provision-app.yml and setup.yml directly."
              - "  Delete the temporary root access key in AWS Console."

    - name: Access key already exists
      debug:
        msg:
          - "✓ IAM user {{ iam_user_name }} already has {{ existing_keys.access_keys | length }} access key(s)."
          - "  No new key was created."
          - ""
          - "  To rotate keys, delete the old key first:"
          - "    aws iam delete-access-key --user-name {{ iam_user_name }} --access-key-id <KEY_ID>"
          - "  Then re-run this playbook."
      when: new_key is skipped

